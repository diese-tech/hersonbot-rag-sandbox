name: Bug report
description: Report a concrete defect in the HersonBot sandbox.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and why it is wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start the stack with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation already run
      placeholder: Include command output or say "not run".
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: This does not require exposing API or Qdrant ports beyond localhost.
        - label: This does not include secrets or real `.env` values.
